<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicio Técnico - GON.NET</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
}

/* HEADER */
.header {
    background: #ffffff;
    text-align: center;
    padding: 20px;
}

.logo img {
    max-width: 260px;
    width: 100%;
}

.titulo {
    font-size: 22px;
    font-weight: bold;
    color: #111;
    margin-top: 10px;
}

.zona {
    color: #555;
    font-size: 14px;
}

/* BOTÓN */
.btn {
    display: inline-block;
    margin-top: 15px;
    background: #25D366;
    color: white;
    padding: 12px 20px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
}

/* CONTENIDO */
.contenido {
    padding: 15px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

/* TARJETAS */
.card img {
    width: 100%;
    display: block;
    border-radius: 8px;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img src="logo.png" alt="Servicio Técnico">
    </div>

    <div class="titulo">Servicio Técnico Integral</div>
    <div class="zona">La Plata y alrededores</div>

    <a class="btn" href="https://wa.me/542216998381" target="_blank">
        Consultar por WhatsApp
    </a>
</div>

<!-- CONTENIDO -->
<div class="contenido">

    <div class="grid">

        <div class="card">
            <img src="pc.jpg" alt="PC">
        </div>

        <div class="card">
            <img src="datos.jpg" alt="Recuperación de datos">
        </div>

        <div class="card">
            <img src="celular.jpg" alt="Servicio técnico celulares">
        </div>

        <div class="card">
            <img src="wifi.jpg" alt="WiFi">
        </div>

    </div>

</div>

</body>
</html>
