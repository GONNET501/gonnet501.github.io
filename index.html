<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicio Técnico - GON.NET</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
}

/* HEADER */
.header {
    background: #ffffff;
    text-align: center;
    padding: 25px 15px;
}

.logo img {
    max-width: 260px;
    width: 100%;
}

.subtitulo {
    font-size: 22px;
    font-weight: bold;
    color: #111;
    margin-top: 10px;
}

.zona {
    color: #555;
    margin-top: 5px;
}

.btn {
    display: inline-block;
    margin-top: 15px;
    background: #25D366;
    color: white;
    padding: 12px 20px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
}

/* CONTENIDO */
.contenido {
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
    max-width: 1100px;
    margin: auto;
}

/* TARJETAS */
.card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: auto;
    display: block;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">

    <div class="logo">
        <img src="logo.png" alt="Logo Servicio Técnico">
    </div>

    <div class="subtitulo">Servicio Técnico Integral</div>
    <div class="zona">Manuel B. Gonnet, La Plata y alrededores</div>

    <a class="btn" href="https://wa.me/542216998381" target="_blank">
        Consultar por WhatsApp
    </a>

</div>

<!-- CONTENIDO -->
<div class="contenido">

    <div class="grid">

        <!-- PC -->
        <div class="card">
            <img src="pc.jpg" alt="Servicio Técnico PC">
        </div>

        <!-- DATOS -->
        <div class="card">
            <img src="datos.jpg" alt="Recuperación de datos">
        </div>

        <!-- CELULAR (EL QUE TE ESTABA FALLANDO) -->
        <div class="card">
            <img src="celular.jpg" alt="Servicio Técnico Celulares">
        </div>

        <!-- WIFI -->
        <div class="card">
            <img src="wifi.jpg" alt="Redes WiFi">
        </div>

    </div>

</div>

</body>
</html>
