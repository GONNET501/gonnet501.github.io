<!-- ===== SECCIÓN FLYERS GON.NET ===== -->

<style>
.flyers-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.flyer {
  width: 100%;
  height: auto;
  border-radius: 12px;
  transition: transform 0.2s ease;
}

/* efecto suave (opcional, pero queda profesional) */
.flyer:hover {
  transform: scale(1.02);
}

/* evita que sean gigantes en pantallas grandes */
@media (min-width: 1024px) {
  .flyer {
    max-height: 500px;
    object-fit: cover;
  }
}
</style>


<div class="flyers-container">

  <!-- PC -->
  <img src="img/flyer-pc.jpg" alt="Servicio técnico de PC" class="flyer">

  <!-- DATOS -->
  <img src="img/flyer-datos.jpg" alt="Recuperación de datos" class="flyer">

  <!-- CELULARES -->
  <img src="img/flyer-celulares.jpg" alt="Configuración de celulares" class="flyer">

  <!-- REDES / WIFI -->
  <img src="img/flyer-wifi.jpg" alt="Mejora de redes WiFi" class="flyer">

</div>
